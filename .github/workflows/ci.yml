# .github/workflows/ci.yml
name: MLOps Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code into the GitHub runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Provision an isolated Python environment
    - name: Set up Python 3.11
      uses: actions/with-python@v5
      with:
        python-version: '3.11'

    # 3. Cache dependencies to optimize consecutive pipeline runs
    - name: Cache Python Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Install requirements along with testing utilities
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Lint the codebase to enforce clean pep8 code layout patterns
    - name: Lint Code with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6. Execute our unit test suite using pytest
    - name: Run Test Engine
      run: |
        pytest tests/

  verify-docker-build:
    needs: validate-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 7. Verify the Dockerfile compiles without deploying it live
    - name: Build and Test Docker Image
      run: |
        docker build -t salary-engine:test .
        docker images